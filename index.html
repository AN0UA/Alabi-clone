<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella Clone - OCR Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); max-width: 480px; width: 100%; text-align: center; }
        h1 { color: #007aff; font-size: 26px; margin-bottom: 8px; }
        p { color: #777; font-size: 14px; line-height: 1.5; }
        .btn-select { background-color: #007aff; color: white; border: none; padding: 18px 30px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; margin-top: 24px; transition: all 0.2s; }
        .btn-select:active { transform: scale(0.98); background-color: #0056b3; }
        #progress-section { margin-top: 35px; display: none; width: 100%; }
        progress { width: 100%; height: 10px; border-radius: 5px; -webkit-appearance: none; appearance: none; }
        progress::-webkit-progress-bar { background-color: #eee; border-radius: 5px; }
        progress::-webkit-progress-value { background-color: #007aff; border-radius: 5px; }
        #status-text { margin-top: 12px; font-weight: 600; color: #333; }
        #log-area { margin-top: 15px; height: 100px; background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; font-size: 11px; overflow-y: auto; padding: 10px; text-align: left; font-family: 'Courier New', monospace; color: #555; }
        #download-section { margin-top: 25px; display: none; }
        .btn-download { background-color: #28a745; color: white; border: none; padding: 16px 30px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ella Clone OCR</h1>
        <p>Numérisation haute performance<br>Jusqu'à 150 images simultanées</p>
        
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">Sélectionner les Photos</button>

        <div id="progress-section">
            <progress id="progressBar" value="0" max="100"></progress>
            <div id="status-text">Initialisation...</div>
            <div id="log-area"></div>
        </div>

        <div id="download-section">
            <button class="btn-download" id="downloadBtn">Télécharger le Document .TXT</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status-text');
        const logArea = document.getElementById('log-area');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressSection = document.getElementById('progress-section');
        const downloadSection = document.getElementById('download-section');

        let accumulatedText = "";

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            progressSection.style.display = 'block';
            downloadSection.style.display = 'none';
            logArea.innerHTML = "";
            accumulatedText = "";
            let processedCount = 0;

            const worker = await Tesseract.createWorker('fra');

            for (const file of files) {
                processedCount++;
                statusText.innerText = `Analyse : ${processedCount} / ${files.length}`;
                logArea.innerHTML += `> Traitement de ${file.name}...<br>`;
                logArea.scrollTop = logArea.scrollHeight;

                try {
                    const { data: { text } } = await worker.recognize(file);
                    accumulatedText += `\n--- PAGE ${processedCount} (${file.name}) ---\n\n${text}\n\n`;
                } catch (err) {
                    logArea.innerHTML += `<span style="color:red">> Erreur : ${file.name}</span><br>`;
                }

                progressBar.value = (processedCount / files.length) * 100;
            }

            await worker.terminate();
            statusText.innerText = "Traitement terminé !";
            downloadSection.style.display = 'block';
        });

        downloadBtn.onclick = () => {
            const blob = new Blob([accumulatedText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Scan_Ella_Clone.txt";
            a.click();
        };
    </script>
</body>
</html>
