<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ella Clone - OCR Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8/build/index.umd.js"></script>

  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #161920;
      --s2:       #1e222d;
      --border:   #2a2f3d;
      --accent:   #4f8cff;
      --violet:   #a78bfa;
      --green:    #34d399;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --fh:       'Syne', sans-serif;
      --fm:       'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fh);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 80px;
      position: relative; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(79,140,255,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px 28px;
      max-width: 500px; width: 100%;
      position: relative; z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* ── Header ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(79,140,255,0.1);
      border: 1px solid rgba(79,140,255,0.2);
      color: var(--accent);
      font-family: var(--fm); font-size: 11px;
      padding: 4px 10px; border-radius: 6px;
      letter-spacing: 0.08em; margin-bottom: 12px;
    }
    h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
      line-height: 1.2; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text) 40%, var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sub { font-family: var(--fm); font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

    /* ── API key ── */
    .field-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
    }
    .api-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .api-input {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      color: var(--text); font-family: var(--fm); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .api-input:focus { border-color: var(--accent); }
    .api-input::placeholder { color: var(--muted); }
    .btn-eye {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px;
      color: var(--muted); cursor: pointer; font-size: 14px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-eye:hover { color: var(--text); border-color: var(--accent); }

    /* ── Select button ── */
    .btn-select {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--violet));
      border: none; border-radius: 13px; padding: 17px;
      color: #fff; font-family: var(--fh); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-select:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-select:active { transform: scale(0.99); opacity: 1; }
    .btn-select:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Stepper ── */
    .stepper {
      display: flex; align-items: center; gap: 0;
      margin: 28px 0 0; display: none;
    }
    .step {
      flex: 1; text-align: center;
      font-family: var(--fm); font-size: 10px; color: var(--muted);
      position: relative;
    }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--s2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; margin: 0 auto 6px;
      transition: all 0.3s;
    }
    .step.active .step-dot   { border-color: var(--accent); background: rgba(79,140,255,0.15); color: var(--accent); }
    .step.done .step-dot     { border-color: var(--green);  background: rgba(52,211,153,0.15); }
    .step.active .step-label { color: var(--text); }
    .step.done .step-label   { color: var(--green); }
    .step-line {
      height: 2px; flex: 0 0 24px;
      background: var(--border); border-radius: 1px;
      transition: background 0.3s;
    }
    .step-line.done { background: var(--green); }

    /* ── Progress block ── */
    .progress-wrap { display: none; margin-top: 24px; }
    .track { background: var(--s2); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 10px; }
    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--violet));
      border-radius: 99px; width: 0%; transition: width 0.4s ease;
    }
    .fill.indeterminate { width: 35%; animation: slide 1.3s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(420%); } }
    .status-line { font-family: var(--fm); font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .log {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 12px; font-family: var(--fm); font-size: 11px;
      color: var(--muted); height: 110px; overflow-y: auto; line-height: 1.75;
    }
    .log .ok   { color: var(--green); }
    .log .err  { color: var(--red); }
    .log .info { color: var(--accent); }
    .log .warn { color: var(--yellow); }

    /* ── Download buttons ── */
    .dl-wrap { display: none; margin-top: 20px; flex-direction: column; gap: 10px; }
    .btn-dl {
      width: 100%; border: none; border-radius: 12px; padding: 15px;
      font-family: var(--fh); font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .btn-dl.word {
      background: rgba(79,140,255,0.13);
      border: 1px solid rgba(79,140,255,0.3); color: var(--accent);
    }
    .btn-dl.word:hover { background: rgba(79,140,255,0.22); transform: translateY(-1px); }
    .btn-dl.txt {
      background: var(--s2);
      border: 1px solid var(--border); color: var(--muted);
      font-size: 13px;
    }
    .btn-dl.txt:hover { color: var(--text); border-color: var(--accent); }

    /* ── Divider ── */
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="card">

  <div class="badge">◈ Ella Clone OCR Pro</div>
  <h1>Photos → Word</h1>
  <p class="sub">Scanne jusqu'à 150 images, extrait le texte<br>et génère un .docx structuré — en un seul clic.</p>

  <!-- API Key -->
  <div class="field-label">Clé API Anthropic</div>
  <div class="api-row">
    <input class="api-input" id="apiKey" type="password" placeholder="sk-ant-api03-…" autocomplete="off" />
    <button class="btn-eye" onclick="toggleKey()" title="Afficher">👁</button>
  </div>

  <!-- Main action -->
  <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
  <button class="btn-select" id="selectBtn" onclick="document.getElementById('fileInput').click()">
    Sélectionner les Photos
  </button>

  <!-- Stepper -->
  <div class="stepper" id="stepper">
    <div class="step" id="s1"><div class="step-dot">📷</div><div class="step-label">OCR</div></div>
    <div class="step-line" id="l1"></div>
    <div class="step" id="s2"><div class="step-dot">🤖</div><div class="step-label">Claude</div></div>
    <div class="step-line" id="l2"></div>
    <div class="step" id="s3"><div class="step-dot">📄</div><div class="step-label">Word</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="status-line" id="statusLine">Initialisation…</div>
    <div class="log" id="logArea"></div>
  </div>

  <!-- Downloads -->
  <div class="dl-wrap" id="dlWrap">
    <button class="btn-dl word" id="btnWord" style="display:none">⬇️ &nbsp;Télécharger le .docx</button>
    <button class="btn-dl txt"  id="btnTxt"  style="display:none">Télécharger le .txt brut (OCR)</button>
  </div>

</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

// ── State ──────────────────────────────────────────────────────────────────
let ocrText  = '';
let docxBlob = null;

// ── UI helpers ─────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const log = (msg, cls='') => {
  const d = $('logArea');
  d.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  d.scrollTop = d.scrollHeight;
};
const setStatus = msg => $('statusLine').textContent = msg;
const setFill   = pct => { $('fill').classList.remove('indeterminate'); $('fill').style.width = pct + '%'; };
const spinning  = ()  => $('fill').classList.add('indeterminate');

function toggleKey() {
  const k = $('apiKey');
  k.type = k.type === 'password' ? 'text' : 'password';
}

function stepActive(n) {
  [1,2,3].forEach(i => {
    $('s'+i).className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    if (i < 3) $('l'+i).className = 'step-line' + (i < n ? ' done' : '');
  });
  // update done dots to checkmarks
  [1,2,3].forEach(i => {
    if (i < n) $('s'+i).querySelector('.step-dot').textContent = '✓';
  });
}

// ── File select ────────────────────────────────────────────────────────────
$('fileInput').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  const apiKey = $('apiKey').value.trim();

  // Reset UI
  $('selectBtn').disabled = true;
  $('stepper').style.display = 'flex';
  $('progressWrap').style.display = 'block';
  $('dlWrap').style.display = 'none';
  $('logArea').innerHTML = '';
  ocrText = ''; docxBlob = null;

  // ── PHASE 1 : OCR ─────────────────────────────────────────────────────
  stepActive(1);
  spinning();
  log(`${files.length} image(s) détectée(s). Démarrage OCR…`, 'info');

  const worker = await Tesseract.createWorker('fra');
  let done = 0;

  for (const file of files) {
    done++;
    setStatus(`OCR : ${done} / ${files.length} — ${file.name}`);
    log(`> ${file.name}…`);
    try {
      const { data: { text } } = await worker.recognize(file);
      ocrText += `\n--- PAGE ${done} (${file.name}) ---\n\n${text}\n\n`;
      log(`  ✓ ${done}/${files.length}`, 'ok');
    } catch (err) {
      log(`  ✗ Erreur : ${file.name}`, 'err');
    }
    setFill((done / files.length) * 45);
  }
  await worker.terminate();
  log('OCR terminé.', 'ok');

  // ── PHASE 2 : Claude ──────────────────────────────────────────────────
  if (apiKey) {
    stepActive(2);
    spinning();
    setFill(50);
    setStatus('Envoi vers Claude AI…');
    log('Analyse structurelle par Claude…', 'info');

    try {
      const structured = await callClaude(apiKey, ocrText);
      setFill(75);
      log('Structure reconstruite.', 'ok');

      // ── PHASE 3 : Build DOCX
      stepActive(3);
      setStatus('Génération du fichier Word…');
      log('Construction du .docx…', 'info');
      docxBlob = await buildDocx(structured);
      setFill(100);
      log('Fichier Word prêt !', 'ok');
      setStatus('Terminé ✓');
      $('btnWord').style.display = 'flex';
      $('btnWord').onclick = () => dlBlob(docxBlob, 'Ella_Clone_Document.docx');

    } catch (err) {
      log('Claude : ' + err.message, 'err');
      log('Fallback : .txt disponible.', 'warn');
      setStatus('Erreur Claude — .txt disponible');
      $('btnWord').style.display = 'none';
    }

  } else {
    log('Pas de clé API — OCR seul.', 'warn');
    setStatus('OCR terminé — .txt disponible');
    setFill(100);
    $('btnWord').style.display = 'none';
  }

  // Toujours afficher le bouton txt
  $('btnTxt').style.display = 'flex';
  $('btnTxt').onclick = () => dlBlob(new Blob([ocrText], { type: 'text/plain' }), 'Scan_Ella_Clone.txt');
  $('dlWrap').style.display = 'flex';
  $('selectBtn').disabled = false;
  // Reset file input so same files can be reselected
  $('fileInput').value = '';
});

function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function callClaude(apiKey, text) {
  const system = `Tu es un expert en reconstruction de documents. Tu reçois du texte OCR brut (souvent bruité) et tu dois reconstruire le document propre et structuré.
Retourne UNIQUEMENT un objet JSON. Aucun markdown, aucun backtick, aucune explication.

Schéma JSON :
{
  "title": string,
  "institution": string | null,
  "subtitle": string | null,
  "metadata": [{"label": string, "value": string}],
  "sections": [
    {
      "heading": string | null,
      "level": 1 | 2,
      "blocks": [
        {
          "type": "paragraph" | "question" | "subquestion" | "fill_blank" | "bonus",
          "text": string,
          "number": string | null,
          "points": string | null
        }
      ]
    }
  ],
  "bonus": string | null
}

Règles :
- Corrige intelligemment les erreurs OCR (mots cassés, accents manquants)
- Identifie les questions numérotées et sous-questions (a-, b-, etc.)
- Pour les textes à trous, conserve les blancs sous forme "___"
- Extrait les barèmes de points ex: "(2 pts)"
- Le document est probablement en français`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system,
      messages: [{ role: 'user', content: `Voici le texte OCR à reconstruire :\n\n${text}` }]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const raw  = data.content.map(b => b.text || '').join('');
  const clean = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  return JSON.parse(clean);
}

// ── Build DOCX ─────────────────────────────────────────────────────────────
async function buildDocx(doc) {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel,
          AlignmentType, BorderStyle, UnderlineType } = docx;

  const children = [];

  if (doc.institution) children.push(new Paragraph({
    alignment: AlignmentType.CENTER, spacing: { after: 60 },
    children: [new TextRun({ text: doc.institution, bold: true, size: 28, font: 'Arial' })]
  }));

  if (doc.subtitle) children.push(new Paragraph({
    alignment: AlignmentType.CENTER, spacing: { after: 80 },
    children: [new TextRun({ text: doc.subtitle, size: 24, font: 'Arial' })]
  }));

  for (const m of (doc.metadata || [])) {
    children.push(new Paragraph({
      alignment: AlignmentType.CENTER, spacing: { after: 40 },
      children: [
        new TextRun({ text: m.label + ' : ', bold: true, size: 22, font: 'Arial' }),
        new TextRun({ text: m.value, size: 22, font: 'Arial' })
      ]
    }));
  }

  if ((doc.metadata || []).length) children.push(new Paragraph({ spacing: { after: 160 }, children: [] }));

  if (doc.title) children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: '1F3864', space: 1 } },
    spacing: { after: 240 },
    children: [new TextRun({ text: doc.title.toUpperCase(), bold: true, size: 32, font: 'Arial', color: '1F3864' })]
  }));

  for (const section of (doc.sections || [])) {
    if (section.heading) children.push(new Paragraph({
      heading: section.level === 1 ? HeadingLevel.HEADING_1 : HeadingLevel.HEADING_2,
      spacing: { before: 240, after: 120 },
      children: [new TextRun({ text: section.heading, bold: true, font: 'Arial', size: section.level === 1 ? 28 : 26 })]
    }));

    for (const block of (section.blocks || [])) {
      const runs = [];
      if (block.number) runs.push(new TextRun({ text: block.number + ' ', bold: true, font: 'Arial', size: 24 }));

      for (const part of block.text.split(/(_+)/g)) {
        if (part.match(/^_+$/)) {
          runs.push(new TextRun({ text: '          ', underline: { type: UnderlineType.SINGLE }, font: 'Arial', size: 24 }));
        } else if (part) {
          runs.push(new TextRun({ text: part, font: 'Arial', size: 24 }));
        }
      }

      if (block.points) runs.push(new TextRun({ text: '  ' + block.points, bold: true, color: '777777', font: 'Arial', size: 22 }));

      children.push(new Paragraph({
        indent: block.type === 'subquestion' ? { left: 720 } : undefined,
        spacing: { after: block.type === 'subquestion' ? 80 : 120 },
        children: runs
      }));
    }
  }

  if (doc.bonus) children.push(new Paragraph({
    spacing: { before: 240, after: 80 },
    border: { top: { style: BorderStyle.SINGLE, size: 4, color: 'AAAAAA', space: 1 } },
    children: [new TextRun({ text: doc.bonus, bold: true, italics: true, font: 'Arial', size: 24, color: '555555' })]
  }));

  const document = new Document({
    styles: {
      default: { document: { run: { font: 'Arial', size: 24 } } },
      paragraphStyles: [
        { id: 'Heading1', name: 'Heading 1', basedOn: 'Normal', next: 'Normal', quickFormat: true,
          run: { size: 28, bold: true, font: 'Arial', color: '1F3864' },
          paragraph: { spacing: { before: 240, after: 120 }, outlineLevel: 0 } },
        { id: 'Heading2', name: 'Heading 2', basedOn: 'Normal', next: 'Normal', quickFormat: true,
          run: { size: 26, bold: true, font: 'Arial', color: '2E75B6' },
          paragraph: { spacing: { before: 200, after: 100 }, outlineLevel: 1 } }
      ]
    },
    sections: [{
      properties: { page: {
        size: { width: 11906, height: 16838 },
        margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
      }},
      children
    }]
  });

  return Packer.toBlob(document);
}
</script>
</body>
</html>
